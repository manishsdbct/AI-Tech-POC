services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_gateway
    ports: ["5432:5432"]

  gateway:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [redis, postgres]
